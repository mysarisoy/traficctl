# This rule is not used by the project trafficctl itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the traffic.traffic.devops.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: trafficctl
    app.kubernetes.io/managed-by: kustomize
  name: trafficpolicy-editor-role
rules:
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies/status
  verbs:
  - get
