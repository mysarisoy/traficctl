---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - httproutes
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies/finalizers
  verbs:
  - update
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies/status
  verbs:
  - get
  - patch
  - update
