# This rule is not used by the project trafficctl itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over traffic.traffic.devops.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: trafficctl
    app.kubernetes.io/managed-by: kustomize
  name: trafficpolicy-admin-role
rules:
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies
  verbs:
  - '*'
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies/status
  verbs:
  - get
