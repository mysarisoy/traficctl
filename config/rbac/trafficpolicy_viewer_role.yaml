# This rule is not used by the project trafficctl itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to traffic.traffic.devops.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: trafficctl
    app.kubernetes.io/managed-by: kustomize
  name: trafficpolicy-viewer-role
rules:
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - traffic.traffic.devops.io
  resources:
  - trafficpolicies/status
  verbs:
  - get
