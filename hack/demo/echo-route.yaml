# Two echo deployments + a Service per version + a single HTTPRoute that
# splits across both backendRefs. The TrafficPolicy controls the weights.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-v1
  namespace: trafficctl-demo
spec:
  replicas: 1
  selector: { matchLabels: { app: echo, version: v1 } }
  template:
    metadata: { labels: { app: echo, version: v1 } }
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0
          args: [-listen=:8080, -text=hello from v1]
          ports: [{ containerPort: 8080 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-v2
  namespace: trafficctl-demo
spec:
  replicas: 1
  selector: { matchLabels: { app: echo, version: v2 } }
  template:
    metadata: { labels: { app: echo, version: v2 } }
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0
          args: [-listen=:8080, -text=hello from v2]
          ports: [{ containerPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: echo-v1, namespace: trafficctl-demo }
spec:
  selector: { app: echo, version: v1 }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: v1
kind: Service
metadata: { name: echo-v2, namespace: trafficctl-demo }
spec:
  selector: { app: echo, version: v2 }
  ports: [{ port: 80, targetPort: 8080 }]
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-route
  namespace: trafficctl-demo
spec:
  rules:
    - backendRefs:
        - name: echo-v1
          port: 80
          weight: 50
        - name: echo-v2
          port: 80
          weight: 50
